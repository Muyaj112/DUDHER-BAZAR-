<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUDHER BAZAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-between">

    <div id="appSplashScreen" class="fixed inset-0 bg-gradient-to-br from-teal-800 to-teal-950 z-[9999] flex flex-col items-center justify-center transition-all duration-700 ease-in-out">
        <div class="text-center">
            <div class="w-32 h-32 mx-auto mb-4 relative">
                <img src="https://docs.google.com/uc?export=download&id=1E5V8ZKgIhGu6Ti9y7rBwvNBF4USNLHmR" class="w-full h-full object-contain rounded-full border-4 border-white/20 shadow-2xl animate-bounce" alt="Dudher Bazar Logo" style="animation-duration: 0.8s;">
                <div class="absolute inset-0 bg-teal-400/20 blur-xl rounded-full -z-10 animate-pulse"></div>
            </div>
            <h1 class="text-white text-2xl font-black tracking-widest uppercase mb-1 drop-shadow-md">দুধের বাজার</h1>
            <p class="text-teal-200 text-xs tracking-wider font-medium opacity-80 animate-pulse">খাঁটি দুধের বিশ্বস্ত ঠিকানা...</p>
        </div>
        <div class="absolute bottom-10 flex flex-col items-center space-y-2">
            <div class="w-6 h-6 border-2 border-teal-200 border-t-transparent rounded-full animate-spin"></div>
            <span class="text-[10px] text-teal-300 font-bold tracking-widest uppercase">Loading App</span>
        </div>
    </div>


    <div class="flex-grow flex items-center justify-center p-4 pt-12">
        <div class="max-w-md w-full bg-gradient-to-br from-white to-teal-50/30 p-6 rounded-3xl shadow-xl border border-teal-100/50 backdrop-blur-sm">
            <div class="text-center mb-5">
                <span class="bg-teal-100 text-teal-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">Fast Checkout</span>
                <h2 class="text-xl font-black text-gray-800 mt-2">অর্ডার করুন</h2>
            </div>
            
            <form id="dudherBazarOrderForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5 ml-1">প্রতিষ্ঠানের নাম / আপনার নাম</label>
                    <input type="text" id="custName" required placeholder="যেমন: Diyan Sarkar" class="w-full p-3.5 bg-gray-50/50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all duration-300">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5 ml-1">মোবাইল নাম্বার (যোগাযোগের জন্য)</label>
                    <input type="tel" id="custContact" required placeholder="যেমন: 017XXXXXXXX" class="w-full p-3.5 bg-gray-50/50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all duration-300">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5 ml-1">হোয়াটসঅ্যাপ নাম্বার (মেসেজ পাওয়ার জন্য)</label>
                    <input type="tel" id="custWhatsApp" required placeholder="যেমন: 017XXXXXXXX" class="w-full p-3.5 bg-gray-50/50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all duration-300">
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-teal-700 to-teal-800 text-white font-bold p-4 rounded-2xl shadow-lg shadow-teal-700/20 hover:from-teal-800 hover:to-teal-900 transition-all duration-300 transform hover:-translate-y-0.5 active:translate-y-0 mt-4 flex items-center justify-center space-x-2">
                    <span>অর্ডার সাবমিট করুন</span>
                    <i class="fa-solid fa-paper-plane text-sm"></i>
                </button>
            </form>
        </div>
    </div>


    <div id="successModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl border border-gray-100 transform scale-90 transition-transform duration-300" id="modalCard">
            <div class="relative w-28 h-28 mx-auto mb-4">
                <img src="https://docs.google.com/uc?export=download&id=1E5V8ZKgIhGu6Ti9y7rBwvNBF4USNLHmR" id="dancingCow" class="w-full h-full object-contain rounded-full border-4 border-teal-500 shadow-md" alt="Dudher Bazar Logo">
                <span class="absolute -top-1 -right-1 text-xl animate-ping">🎉</span>
                <span class="absolute -bottom-1 -left-1 text-xl animate-bounce">✨</span>
            </div>
            <h3 class="text-xl font-black text-gray-800 mb-2">অর্ডার সফল হয়েছে!</h3>
            <p class="text-sm text-gray-500 leading-relaxed mb-6">ধন্যবাদ! আপনার অর্ডারটি সিস্টেমে রেকর্ড করা হয়েছে। 'DUDHER BAZAR' টিম খুব শীঘ্রই আপনার সাথে যোগাযোগ করবে।</p>
            <button id="goToWhatsAppBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-3.5 rounded-xl shadow-md transition-all flex items-center justify-center space-x-2">
                <i class="fa-brands fa-whatsapp text-lg"></i>
                <span>হোয়াটসঅ্যাপ মেসেজ দিন</span>
            </button>
        </div>
    </div>


    <script>
    let finalWhatsAppUrl = "";

    // স্প্ল্যাশ স্ক্রিন টাইমিং (৩ সেকেন্ড)
    window.addEventListener('DOMContentLoaded', (event) => {
        setTimeout(() => {
            const splash = document.getElementById('appSplashScreen');
            splash.style.opacity = '0';
            setTimeout(() => { splash.remove(); }, 700); 
        }, 3000);
    });

    // ফর্ম সাবমিশন লজিক
    document.getElementById('dudherBazarOrderForm').addEventListener('submit', function(event) {
        event.preventDefault();

        var name = document.getElementById('custName').value;
        var contactNum = document.getElementById('custContact').value;
        var whatsAppNum = document.getElementById('custWhatsApp').value;

        if(whatsAppNum.startsWith('0')) {
            whatsAppNum = '88' + whatsAppNum;
        }

        var messageText = "আসসালামু আলাইকুম " + name + " ভাই,\n\n'দুধের বাজার'-এ অর্ডার করার জন্য আপনাকে ধন্যবাদ! 🥛\n\nYour order is recorded successfully.\n📱 Contact Number: " + contactNum + "\n\nখুব শীঘ্রই আমাদের টিম যোগাযোগ করছে। আমাদের সাথেই থাকুন! 🚀";
        var encodedMessage = encodeURIComponent(messageText);
        finalWhatsAppUrl = "https://wa.me/" + whatsAppNum + "?text=" + encodedMessage;

        // পপআপ শো এবং লোগো নাচানো
        const modal = document.getElementById('successModal');
        const card = document.getElementById('modalCard');
        const cow = document.getElementById('dancingCow');

        modal.classList.remove('hidden');
        setTimeout(() => {
            modal.classList.add('opacity-100');
            card.classList.remove('scale-90');
            card.classList.add('scale-100');
        }, 10);

        cow.classList.add('animate-bounce');
        cow.style.animationIterationCount = "infinite";
        cow.style.animationDuration = "0.8s";
    });

    // হোয়াটসঅ্যাপ বাটনে ক্লিক করলে রিডাইরেক্ট
    document.getElementById('goToWhatsAppBtn').addEventListener('click', function() {
        if(finalWhatsAppUrl !== "") {
            window.location.href = finalWhatsAppUrl;
        }
    });
    </script>
</body>
</html>
